<!DOCTYPE html>

<html class="dark" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-container": "#eec540",
                    "on-tertiary": "#3c2f00",
                    "primary": "#ffe2ab",
                    "error-container": "#93000a",
                    "surface-container-high": "#2a2a2a",
                    "on-background": "#e5e2e1",
                    "on-primary-container": "#6d5000",
                    "on-error": "#690005",
                    "inverse-surface": "#e5e2e1",
                    "on-secondary": "#432c00",
                    "on-secondary-container": "#593c00",
                    "on-error-container": "#ffdad6",
                    "surface-container-lowest": "#0e0e0e",
                    "surface-container-highest": "#353534",
                    "secondary-container": "#e6a102",
                    "on-primary-fixed-variant": "#5c4300",
                    "tertiary-fixed": "#ffe087",
                    "primary-fixed": "#ffdfa0",
                    "tertiary": "#ffe396",
                    "on-primary-fixed": "#261a00",
                    "secondary-fixed": "#ffdead",
                    "on-surface": "#e5e2e1",
                    "surface-tint": "#fbbc00",
                    "surface-container": "#201f1f",
                    "background": "#131313",
                    "inverse-primary": "#795900",
                    "surface-bright": "#393939",
                    "primary-container": "#ffbf00",
                    "on-secondary-fixed-variant": "#604100",
                    "on-tertiary-fixed-variant": "#574500",
                    "outline": "#9c8f78",
                    "surface-dim": "#131313",
                    "on-tertiary-container": "#675200",
                    "surface": "#131313",
                    "outline-variant": "#504532",
                    "error": "#ffb4ab",
                    "secondary-fixed-dim": "#ffba3a",
                    "on-tertiary-fixed": "#241a00",
                    "secondary": "#ffbe4a",
                    "on-secondary-fixed": "#281900",
                    "on-primary": "#402d00",
                    "surface-container-low": "#1c1b1b",
                    "inverse-on-surface": "#313030",
                    "primary-fixed-dim": "#fbbc00",
                    "surface-variant": "#353534",
                    "on-surface-variant": "#d4c5ab",
                    "tertiary-fixed-dim": "#ebc23e"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Manrope"],
                    "label": ["Manrope"]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #353534; border-radius: 10px; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#131313]/70 backdrop-blur-xl shadow-[0_10px_40px_rgba(255,191,0,0.06)] flex justify-between items-center px-6 h-16 w-full">
<div class="flex items-center gap-3 active:scale-95 duration-200 transition-opacity hover:opacity-80">
<img class="w-8 h-8 rounded-full border border-primary/20 object-cover" data-alt="close up professional studio portrait of a creative individual with warm amber cinematic lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBEUKU1-mD6OYTEFBFJRjHW85F2GQJSFWRHbGVpgPmKrt2AiQiaqsN0jDvE_H0xGBAUI7C36-cOfYUGUPS2daregB3Xro5Ud6klZlHir7-1DmLykwEdPTJ91wOAFG08XUWpUCpoUUNI3E-8oqsXgobWZyu66iC6Blk4xewRz9d83OQMaPurFfkcZC4n_7YZHZ38QH3lQzJIEGI8NwOzgFrXqVP1aDCP1W4K6rnmTDmnRl4bmi_L7P--0j6NRXBExs-N_1s9JuFeIgVt"/>
<span class="text-xl font-bold tracking-tighter text-[#ffbf00]">싱송 다이어리</span>
</div>
<div class="flex items-center gap-4">
<button class="text-[#ffe2ab] active:scale-95 duration-200 transition-opacity hover:opacity-80">
<span class="material-symbols-outlined">logout</span>
</button>
</div>
</header>
<main class="pt-24 px-6 max-w-4xl mx-auto space-y-12">
<!-- Date Header (Editorial) -->
<section>
<span class="text-primary-container font-label uppercase tracking-[0.2em] text-xs font-semibold block mb-2">Recording Session</span>
<h1 class="text-5xl md:text-7xl font-headline font-extrabold tracking-tighter text-primary">2026.04.07</h1>
</section>
<!-- Diary Canvas -->
<section class="space-y-6">
<div class="relative group">
<textarea class="w-full min-h-[300px] bg-surface-container-low border-none focus:ring-0 text-on-surface text-xl leading-[1.8] font-body placeholder:text-on-surface-variant/30 rounded-xl p-8 custom-scrollbar resize-none transition-all focus:bg-surface-container" placeholder="오늘 당신의 리듬은 어떤가요? 감정을 적어보세요..."></textarea>
<div class="absolute bottom-4 right-6 text-on-surface-variant/40 font-label text-xs tracking-widest">CHARACTER COUNT: 0</div>
</div>
</section>
<!-- Music Settings Section (Asymmetric Bento Style) -->
<section class="space-y-8">
<div class="flex items-end justify-between border-b border-outline-variant/20 pb-4">
<h2 class="text-2xl font-headline font-bold text-primary">Music Settings</h2>
<span class="font-label text-xs text-on-surface-variant/60 tracking-widest">AI COMPOSITION ENGINE V.2</span>
</div>
<div class="grid grid-cols-1 md:grid-cols-12 gap-4">
<!-- Genre & Mood (Large Block) -->
<div class="md:col-span-8 space-y-8 p-6 bg-surface-container-low rounded-xl">
<div class="space-y-4">
<label class="text-[10px] uppercase tracking-[0.15em] font-bold text-on-surface-variant/70">Genre</label>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 rounded-lg bg-primary-container text-on-primary-container font-semibold text-sm transition-all hover:brightness-110 active:scale-95">Lo-fi</button>
<button class="px-4 py-2 rounded-lg bg-surface-variant text-on-surface-variant text-sm hover:text-primary transition-all active:scale-95">Jazz</button>
<button class="px-4 py-2 rounded-lg bg-surface-variant text-on-surface-variant text-sm hover:text-primary transition-all active:scale-95">Ambient</button>
<button class="px-4 py-2 rounded-lg bg-surface-variant text-on-surface-variant text-sm hover:text-primary transition-all active:scale-95">Classical</button>
<button class="px-4 py-2 rounded-lg bg-surface-variant text-on-surface-variant text-sm hover:text-primary transition-all active:scale-95">Synthwave</button>
</div>
</div>
<div class="space-y-4">
<label class="text-[10px] uppercase tracking-[0.15em] font-bold text-on-surface-variant/70">Mood</label>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 rounded-lg bg-surface-variant text-on-surface-variant text-sm hover:text-primary transition-all active:scale-95">Melancholic</button>
<button class="px-4 py-2 rounded-lg bg-primary-container text-on-primary-container font-semibold text-sm transition-all active:scale-95">Peaceful</button>
<button class="px-4 py-2 rounded-lg bg-surface-variant text-on-surface-variant text-sm hover:text-primary transition-all active:scale-95">Energetic</button>
<button class="px-4 py-2 rounded-lg bg-surface-variant text-on-surface-variant text-sm hover:text-primary transition-all active:scale-95">Nostalgic</button>
</div>
</div>
</div>
<!-- Instrument (Vertical Block) -->
<div class="md:col-span-4 p-6 bg-surface-container-high rounded-xl space-y-4">
<label class="text-[10px] uppercase tracking-[0.15em] font-bold text-on-surface-variant/70">Instrument</label>
<div class="grid grid-cols-1 gap-2">
<button class="flex items-center gap-3 p-3 rounded-lg bg-surface-container-highest border border-primary-container/30 text-primary">
<span class="material-symbols-outlined text-sm">piano</span>
<span class="text-sm font-medium">Grand Piano</span>
</button>
<button class="flex items-center gap-3 p-3 rounded-lg bg-surface-container-highest/40 text-on-surface-variant/60 hover:bg-surface-container-highest hover:text-on-surface transition-all">
<span class="material-symbols-outlined text-sm">music_note</span>
<span class="text-sm font-medium">Acoustic Guitar</span>
</button>
<button class="flex items-center gap-3 p-3 rounded-lg bg-surface-container-highest/40 text-on-surface-variant/60 hover:bg-surface-container-highest hover:text-on-surface transition-all">
<span class="material-symbols-outlined text-sm">voice_selection</span>
<span class="text-sm font-medium">Soft Cello</span>
</button>
</div>
</div>
<!-- Tempo & Texture (Row) -->
<div class="md:col-span-6 p-6 bg-surface-container rounded-xl space-y-4">
<label class="text-[10px] uppercase tracking-[0.15em] font-bold text-on-surface-variant/70">Tempo</label>
<div class="flex items-center justify-between">
<span class="text-xs text-on-surface-variant">Largo</span>
<div class="flex-1 mx-6 h-1 bg-surface-container-highest rounded-full overflow-hidden relative">
<div class="absolute inset-y-0 left-0 w-[40%] bg-primary-container shadow-[0_0_10px_rgba(255,191,0,0.4)]"></div>
<div class="absolute left-[40%] top-1/2 -translate-y-1/2 w-3 h-3 bg-primary rounded-full shadow-lg"></div>
</div>
<span class="text-xs text-on-surface-variant">Presto</span>
</div>
<div class="text-center font-label text-xs tracking-widest text-primary-container">72 BPM</div>
</div>
<div class="md:col-span-6 p-6 bg-surface-container rounded-xl space-y-4">
<label class="text-[10px] uppercase tracking-[0.15em] font-bold text-on-surface-variant/70">Texture</label>
<div class="flex flex-wrap gap-2">
<button class="px-3 py-1.5 rounded-sm bg-surface-variant border border-outline-variant/30 text-xs text-on-surface-variant hover:border-primary transition-all">Grainy</button>
<button class="px-3 py-1.5 rounded-sm bg-primary-container/10 border border-primary-container text-xs text-primary transition-all">Silk Smooth</button>
<button class="px-3 py-1.5 rounded-sm bg-surface-variant border border-outline-variant/30 text-xs text-on-surface-variant hover:border-primary transition-all">Vintage Tape</button>
</div>
</div>
</div>
</section>
<!-- Final Action CTA -->
<section class="flex flex-col items-center py-12 space-y-6">
<div class="text-center space-y-1">
<span class="text-on-surface-variant/60 font-label text-[10px] tracking-[0.3em] uppercase">Daily Quota</span>
<p class="text-2xl font-headline font-bold text-primary">2/3</p>
</div>
<button class="group relative px-12 py-5 bg-primary-container rounded-full overflow-hidden transition-all active:scale-95 duration-200">
<div class="absolute inset-0 bg-gradient-to-tr from-secondary-container to-primary-container opacity-50"></div>
<span class="relative z-10 text-on-primary-container font-headline font-extrabold text-xl tracking-tight flex items-center gap-3">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
                    음악 만들기
                </span>
<div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
</button>
<p class="text-on-surface-variant/40 text-xs font-body max-w-[200px] text-center">AI will compose a 60s track based on your journal's sentiment.</p>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full bg-[#131313]/70 backdrop-blur-xl flex justify-around items-center py-3 pb-safe px-8 z-50 rounded-t-xl shadow-[0_-4px_20px_rgba(0,0,0,0.5)]">
<a class="flex flex-col items-center justify-center bg-[#ffbf00] text-[#131313] rounded-xl px-6 py-1.5 active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined">home</span>
<span class="font-['Manrope'] text-[10px] uppercase tracking-[0.05em] font-medium mt-1">Main</span>
</a>
<a class="flex flex-col items-center justify-center text-[#ffe2ab]/50 px-6 py-1.5 active:scale-90 duration-200 hover:text-[#ffbf00] transition-colors" href="#">
<span class="material-symbols-outlined">history</span>
<span class="font-['Manrope'] text-[10px] uppercase tracking-[0.05em] font-medium mt-1">History</span>
</a>
</nav>
</body></html>
